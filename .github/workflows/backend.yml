name: PayO Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t payo-backend:${{ github.sha }} .
          docker tag payo-backend:${{ github.sha }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Configure kubectl
        working-directory: .
        run: |
          aws eks update-kubeconfig \
            --region ap-south-1 \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        working-directory: .
        run: |
          kubectl set image deployment/payo-backend \
          payo-backend=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} \
          -n ${{ secrets.KUBE_NAMESPACE }}

      - name: Verify Rollout
        working-directory: .
        run: |
          kubectl rollout status deployment/payo-backend \
          -n ${{ secrets.KUBE_NAMESPACE }}

      - name: Show Kubernetes Resources
        working-directory: .
        run: |
          kubectl get deployments -n ${{ secrets.KUBE_NAMESPACE }}
          kubectl get pods -n ${{ secrets.KUBE_NAMESPACE }}
          kubectl get svc -n ${{ secrets.KUBE_NAMESPACE }}
